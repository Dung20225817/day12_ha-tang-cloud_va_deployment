# ============================================================
# railway.toml — Railway deployment configuration
#
# Docs: https://docs.railway.com/reference/config-as-code
# ============================================================

[build]
# Railway tự detect Dockerfile nếu có.
# Nếu không có Dockerfile, dùng Nixpacks (auto-detect Python).
builder = "NIXPACKS"

[deploy]
# ✅ Start command wrapped by shell so PORT is expanded at runtime
# (tránh lỗi truyền literal "$PORT" vào uvicorn).
startCommand = "sh -c 'uvicorn app:app --host 0.0.0.0 --port ${PORT:-8000}'"

# Health check — Railway restart nếu fail
healthcheckPath = "/health"
healthcheckTimeout = 30

# Tự động restart khi crash
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# ============================================================
# Environment variables đặt qua Railway Dashboard hoặc CLI:
#   railway variables set OPENAI_API_KEY=sk-...
#   railway variables set ENVIRONMENT=production
# ============================================================
